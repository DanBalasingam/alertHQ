services:
  db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB}
      - POSTGRES_USER=${USER}
      - POSTGRES_PASSWORD=${PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=md5
      - PG_CONFIG=/etc/postgresql/postgresql.conf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${VAULT_USER} -d ${VAULT_DB} -h localhost" ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
